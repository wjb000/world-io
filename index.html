<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUDOTEK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        body {
            font-family: 'VT323', 'Courier New', monospace;
            background: #050505;
            color: #00ff41;
        }
        
        .crt::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 255, 65, 0.015) 50%, transparent 50%);
            background-size: 100% 3px;
            pointer-events: none;
            z-index: 1;
        }
        
        .matrix-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.06; pointer-events: none; }
        
        .note-row:hover { background: #0a0a0a; }
    </style>
</head>
<body class="min-h-screen crt text-[#00ff41]">
    <canvas id="matrix" class="matrix-bg"></canvas>

    <!-- Top Bar -->
    <div class="fixed top-0 left-0 right-0 bg-black/90 backdrop-blur border-b border-[#00ff41]/30 z-50">
        <div class="max-w-4xl mx-auto px-8 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="fas fa-brain text-3xl text-[#00ff9d]"></i>
                <span class="text-4xl font-bold tracking-[4px]">SUDOTEK</span>
            </div>
            
            <div class="flex items-center gap-3">
                <div class="px-4 py-1.5 bg-[#00ff41]/10 border border-[#00ff41]/40 rounded text-sm">
                    <span id="note-count">3 notes</span>
                </div>
                <button onclick="syncToRepo()" 
                        class="px-5 py-2 border-2 border-[#00ff9d] hover:bg-[#00ff9d] hover:text-black transition-all flex items-center gap-2 text-sm">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span>SYNC TO REPO</span>
                </button>
            </div>
        </div>
    </div>

    <div class="max-w-4xl mx-auto px-8 pt-24 pb-12">
        <div class="text-center mb-10">
            <h1 class="text-6xl font-bold tracking-tight neon-text mb-3">SUDOTEK</h1>
            <p class="text-[#00ff9d] text-2xl">Neural Brain Architecture • Simple Notes</p>
        </div>

        <!-- Quick Add -->
        <div class="mb-8 flex gap-3">
            <input id="quick-input" type="text" 
                   class="flex-1 bg-black border border-[#00ff41]/50 px-6 py-4 text-xl focus:outline-none focus:border-[#00ff9d] placeholder:text-[#00ff41]/50"
                   placeholder="Type your architecture idea and press Enter..." 
                   onkeydown="if (event.key === 'Enter') addQuickNote()">
            <button onclick="addQuickNote()" 
                    class="px-8 py-4 border-2 border-[#00ff41] hover:bg-[#00ff41] hover:text-black transition-all text-xl">
                ADD
            </button>
        </div>

        <!-- Notes List -->
        <div class="terminal-window bg-black border border-[#00ff41]/40">
            <div class="px-6 py-4 border-b border-[#00ff41]/30 flex items-center justify-between">
                <span class="text-[#00ff9d] text-sm tracking-widest">ARCHITECTURE NOTES</span>
            </div>
            
            <div id="notes-list" class="divide-y divide-[#00ff41]/20 max-h-[520px] overflow-auto"></div>
        </div>

        <div class="text-center mt-8 text-[#00ff41]/50 text-sm">
            Notes saved locally • Use SYNC button to push to repo
        </div>
    </div>

    <script>
        function createMatrixRain() {
            const canvas = document.getElementById('matrix');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
            const fontSize = 13;
            const columns = Math.floor(canvas.width / fontSize);
            const drops = Array(columns).fill(1);
            
            function draw() {
                ctx.fillStyle = 'rgba(5, 5, 5, 0.08)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#00ff41';
                ctx.font = fontSize + 'px monospace';
                for (let i = 0; i < drops.length; i++) {
                    ctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }
            setInterval(draw, 55);
        }

        let notes = [];

        function loadNotes() {
            const saved = localStorage.getItem('sudotek_notes');
            if (saved) notes = JSON.parse(saved);
            else {
                notes = [
                    { id: '001', content: 'Brain Regions: Prefrontal, Hippocampus, Amygdala, Visual, Language, Motor — each with mini-LLMs', timestamp: Date.now() - 100000 },
                    { id: '002', content: 'Neural Nodes: Self-contained mini-LLMs with activation state + weighted connections', timestamp: Date.now() - 90000 },
                    { id: '003', content: 'Pathway Propagation: Nodes fire and send activation signals (0-1) to connected nodes, creating organic thought chains', timestamp: Date.now() - 80000 }
                ];
                saveNotes();
            }
            renderNotes();
        }

        function saveNotes() {
            localStorage.setItem('sudotek_notes', JSON.stringify(notes));
            document.getElementById('note-count').innerHTML = `${notes.length} notes`;
        }

        function renderNotes() {
            const container = document.getElementById('notes-list');
            container.innerHTML = '';
            
            if (notes.length === 0) {
                container.innerHTML = `<div class="px-6 py-12 text-center text-[#00ff41]/60">No notes yet. Type above and press ADD or Enter.</div>`;
                return;
            }
            
            notes.sort((a, b) => b.timestamp - a.timestamp).forEach((note, index) => {
                const row = document.createElement('div');
                row.className = `note-row px-6 py-4 flex items-start gap-4 group`;
                
                row.innerHTML = `
                    <div class="flex-1">
                        <div class="flex items-center gap-3 mb-1">
                            <span class="text-[#00ff9d] text-xs tracking-widest">NOTE-${note.id}</span>
                            <span class="text-xs text-[#00ff41]/50">${new Date(note.timestamp).toLocaleDateString()}</span>
                        </div>
                        <div class="text-lg leading-tight">${note.content}</div>
                    </div>
                    
                    <div class="flex items-center gap-2 opacity-40 group-hover:opacity-100 transition-all">
                        <button onclick="editNote(${index})" class="px-2 py-1 text-[#00ff9d] hover:text-white">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button onclick="deleteNote(${index})" class="px-2 py-1 text-red-400 hover:text-red-500 text-xl">
                            &times;
                        </button>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        function addQuickNote() {
            const input = document.getElementById('quick-input');
            const value = input.value.trim();
            if (!value) return;
            
            const newNote = {
                id: Date.now().toString().slice(-6),
                content: value,
                timestamp: Date.now()
            };
            
            notes.unshift(newNote);
            saveNotes();
            renderNotes();
            input.value = '';
        }

        function editNote(index) {
            const newContent = prompt('Edit note:', notes[index].content);
            if (newContent !== null && newContent.trim() !== '') {
                notes[index].content = newContent.trim();
                saveNotes();
                renderNotes();
            }
        }

        function deleteNote(index) {
            if (!confirm('Delete this note?')) return;
            notes.splice(index, 1);
            saveNotes();
            renderNotes();
        }

        function syncToRepo() {
            if (notes.length === 0) {
                alert('No notes to sync yet.');
                return;
            }
            
            const text = notes.map(n => 
                `## Note ${n.id}

${n.content}

---
*Created: ${new Date(n.timestamp).toISOString()}*`
            ).join('

');
            
            navigator.clipboard.writeText(text).then(() => {
                alert('Notes copied to clipboard!\n\nNow tell me in chat: "push these notes to the repo"');
            }).catch(() => {
                prompt('Copy this text and send it to me:', text);
            });
        }

        function initialize() {
            createMatrixRain();
            loadNotes();
            
            document.addEventListener('keydown', e => {
                if (e.key === '/' && document.activeElement.tagName === 'BODY') {
                    e.preventDefault();
                    document.getElementById('quick-input').focus();
                }
            });
            
            console.log('%c[SUDOTEK] Simple notes ready.', 'color:#00ff41');
        }
        window.onload = initialize;
    </script>
</body>
</html>
